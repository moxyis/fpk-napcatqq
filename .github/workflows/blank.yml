name: 通用模板自动打包 Docker FPK 并更新仓库

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "true=只打包不推送，false=生产推送"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}

  APP_ID: "fpk-napcatqq"
  APP_NAME: "NapCatQQ"
  BASE_DIR: "fpk-napcatqq"

  DOCKER_IMAGE: "mlikiowa/napcat-docker"
  DOCKER_API_URL: "https://registry.hub.docker.com/v2/repositories/mlikiowa/napcat-docker/tags?page_size=100"
  DIGEST_FILE: "docker-image-digest.txt"

  FNPACK_VERSION: "1.2.1"
  FNPACK_PLATFORM: "linux-amd64"
  FNPACK_BASE_URL: "https://static2.fnnas.com/fnpack"

  APP_PLATFORM: "all"
  PACKAGE_DIR: "/tmp/fpk_build"
  RELEASE_ARCH_NAME: "all"

  FNDEPOT_REPO: "moxyis/FnDepot"
  FNDEPOT_BRANCH: "main"
  FNDEPOT_APP_DIR: "fpk-zflie"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: 1. 检出当前仓库
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 2. 安装基础依赖
        run: |
          set -euo pipefail
          sudo apt update
          sudo apt install -y jq curl sed skopeo coreutils findutils file

      - name: 3. 初始化环境
        id: init
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.autocrlf false
          git config --global pull.rebase false

          BUILD_TIME=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

          echo "APP_PLATFORM=$APP_PLATFORM"

      - name: 4. 读取本地 manifest 版本
        id: local_ver
        run: |
          set -euo pipefail

          MANIFEST_PATH="$BASE_DIR/manifest"

          if [ ! -f "$MANIFEST_PATH" ]; then
            mkdir -p "$BASE_DIR"
            echo "version = 0.0.0" > "$MANIFEST_PATH"
            echo "platform = $APP_PLATFORM" >> "$MANIFEST_PATH"
          fi

          LOCAL_VERSION=$(sed -n 's/^[[:space:]]*version[[:space:]]*[:=][[:space:]]*//p' "$MANIFEST_PATH" \
            | head -n1 | tr -d '"' | tr -d "'" | tr -d '\r\n' | sed 's/^v//' | xargs)

          if [ -z "$LOCAL_VERSION" ]; then
            LOCAL_VERSION="0.0.0"
          fi

          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "本地版本：[$LOCAL_VERSION]"

      - name: 5. 获取 Docker Hub 最新版本和 digest
        id: remote_ver
        run: |
          set -euo pipefail

          RAW_RESPONSE=$(curl -sSL --retry 3 --connect-timeout 10 "$DOCKER_API_URL")

          ALL_VALID_TAGS=$(echo "$RAW_RESPONSE" | jq -r '.results[]?.name' \
            | grep -v -E 'latest|dev|beta|alpha|nightly|test|rc|preview' \
            | grep -E '^v?[0-9]+\.[0-9]+(\.[0-9]+)?$' || true)

          if [ -z "$ALL_VALID_TAGS" ]; then
            echo "❌ 未找到有效版本标签"
            exit 1
          fi

          REMOTE_VERSION=$(echo "$ALL_VALID_TAGS" | sed 's/^v//' | sort -V | tail -n1)

          MATCH_TAG_WITH_V="v$REMOTE_VERSION"
          MATCH_TAG_NO_V="$REMOTE_VERSION"

          REMOTE_DIGEST=$(echo "$RAW_RESPONSE" | jq -r \
            --arg tag_v "$MATCH_TAG_WITH_V" \
            --arg tag_no_v "$MATCH_TAG_NO_V" \
            '.results[]? | select(.name == $tag_v or .name == $tag_no_v) | .images[0].digest // ""' \
            | head -n1 | tr -d '\r\n' | xargs)

          if [ -z "$REMOTE_DIGEST" ] || [ "$REMOTE_DIGEST" = "null" ]; then
            if echo "$ALL_VALID_TAGS" | grep -qx "$MATCH_TAG_WITH_V"; then
              INSPECT_TAG="$MATCH_TAG_WITH_V"
            else
              INSPECT_TAG="$MATCH_TAG_NO_V"
            fi

            REMOTE_DIGEST=$(skopeo inspect --format '{{.Digest}}' \
              "docker://$DOCKER_IMAGE:$INSPECT_TAG" 2>/dev/null \
              | tr -d '\r\n' | xargs || true)
          fi

          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"
          echo "remote_digest=$REMOTE_DIGEST" >> "$GITHUB_OUTPUT"

      - name: 6. 读取本地 digest
        id: local_digest
        run: |
          set -euo pipefail

          if [ ! -f "$DIGEST_FILE" ]; then
            touch "$DIGEST_FILE"
          fi

          LOCAL_DIGEST=$(cat "$DIGEST_FILE" | tr -d '\r\n' | xargs || true)

          echo "local_digest=$LOCAL_DIGEST" >> "$GITHUB_OUTPUT"

      - name: 7. 判断是否需要更新
        id: compare
        run: |
          set -euo pipefail

          LOCAL_VER="${{ steps.local_ver.outputs.local_version }}"
          REMOTE_VER="${{ steps.remote_ver.outputs.remote_version }}"
          LOCAL_DIG="${{ steps.local_digest.outputs.local_digest }}"
          REMOTE_DIG="${{ steps.remote_ver.outputs.remote_digest }}"

          LOCAL_VER=$(echo "$LOCAL_VER" | sed 's/^v//' | xargs)
          REMOTE_VER=$(echo "$REMOTE_VER" | sed 's/^v//' | xargs)
          LOCAL_DIG=$(echo "$LOCAL_DIG" | xargs)
          REMOTE_DIG=$(echo "$REMOTE_DIG" | xargs)

          if [ "$DEBUG_MODE" = "true" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ Debug 模式：强制打包测试"
            exit 0
          fi

          if [ "$LOCAL_VER" != "$REMOTE_VER" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          elif [ -z "$LOCAL_DIG" ] && [ -n "$REMOTE_DIG" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$LOCAL_DIG" ] && [ -n "$REMOTE_DIG" ] && [ "$LOCAL_DIG" != "$REMOTE_DIG" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 8. 更新本地 manifest、platform 和 digest
        if: steps.compare.outputs.need_update == 'true'
        run: |
          set -euo pipefail

          MANIFEST_PATH="$BASE_DIR/manifest"
          NEW_VER="${{ steps.remote_ver.outputs.remote_version }}"
          NEW_DIG="${{ steps.remote_ver.outputs.remote_digest }}"

          if grep -qE '^[[:space:]]*version[[:space:]]*[:=]' "$MANIFEST_PATH"; then
            sed -i -E \
              "s/(^[[:space:]]*version[[:space:]]*[:=][[:space:]]*)([\"']?).*([\"']?)/\1\2${NEW_VER}\3/" \
              "$MANIFEST_PATH"
          else
            echo "version = $NEW_VER" >> "$MANIFEST_PATH"
          fi

          if grep -qE '^[[:space:]]*platform[[:space:]]*[:=]' "$MANIFEST_PATH"; then
            sed -i -E \
              "s/(^[[:space:]]*platform[[:space:]]*[:=][[:space:]]*)([\"']?).*([\"']?)/\1\2${APP_PLATFORM}\3/" \
              "$MANIFEST_PATH"
          else
            echo "platform = $APP_PLATFORM" >> "$MANIFEST_PATH"
          fi

          echo -n "$NEW_DIG" > "$DIGEST_FILE"

          git add "$MANIFEST_PATH" "$DIGEST_FILE"

          echo "manifest 内容："
          cat "$MANIFEST_PATH"

      - name: 9. 下载并安装 fnpack
        if: steps.compare.outputs.need_update == 'true'
        run: |
          set -euo pipefail

          FNPACK_URL="${FNPACK_BASE_URL}/fnpack-${FNPACK_VERSION}-${FNPACK_PLATFORM}"

          curl -L --retry 3 --connect-timeout 10 -o /tmp/fnpack "$FNPACK_URL"

          if head -n 1 /tmp/fnpack | grep -qiE '<!DOCTYPE|<html'; then
            echo "❌ 下载到的是 HTML，不是 fnpack 二进制"
            exit 1
          fi

          install -m 755 /tmp/fnpack /usr/local/bin/fnpack
          fnpack --help | head -n 10 || true

      - name: 10. 执行 fnpack 打包
        if: steps.compare.outputs.need_update == 'true'
        id: build_fpk
        run: |
          set -euo pipefail

          VERSION="${{ steps.remote_ver.outputs.remote_version }}"

          BUILD_ROOT="/tmp/fpk-packages"
          BUILD_APP_DIR="$BUILD_ROOT/$APP_PLATFORM/$APP_ID"

          rm -rf "$BUILD_ROOT" "$PACKAGE_DIR"
          mkdir -p "$(dirname "$BUILD_APP_DIR")"
          mkdir -p "$PACKAGE_DIR"

          cp -a "$BASE_DIR" "$BUILD_APP_DIR"

          echo "打包目录：$BUILD_APP_DIR"
          find "$BUILD_ROOT" -maxdepth 3 -type d -print

          fnpack build --directory "$BUILD_APP_DIR"

          FPK_FILE=$(find "$BUILD_APP_DIR" -maxdepth 1 -name "*.fpk" -type f | head -n1)

          if [ -z "$FPK_FILE" ]; then
            echo "❌ 未生成 fpk 文件"
            find "$BUILD_APP_DIR" -type f
            exit 1
          fi

          FPK_RELEASE_NAME="${APP_ID}-v${VERSION}-${RELEASE_ARCH_NAME}.fpk"
          FPK_BASE_NAME="${APP_ID}.fpk"

          cp "$FPK_FILE" "$PACKAGE_DIR/$FPK_RELEASE_NAME"
          cp "$FPK_FILE" "$PACKAGE_DIR/$FPK_BASE_NAME"

          echo "fpk_release_file=$PACKAGE_DIR/$FPK_RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "fpk_release_name=$FPK_RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "fpk_base_file=$PACKAGE_DIR/$FPK_BASE_NAME" >> "$GITHUB_OUTPUT"

          ls -lh "$PACKAGE_DIR"
          sha256sum "$PACKAGE_DIR"/*.fpk

      - name: 11. Debug 模式：只验证产物
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'true'
        run: |
          set -euo pipefail

          echo "⚠️ Debug 模式：不推送当前仓库，不推送 FnDepot，不创建 Release"
          ls -lh "$PACKAGE_DIR"
          sha256sum "$PACKAGE_DIR"/*.fpk

      - name: 12. 生产模式：提交当前仓库变更
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          set -euo pipefail

          COMMIT_MSG="chore: 更新${APP_NAME}至v${{ steps.remote_ver.outputs.remote_version }}"

          if git diff --cached --quiet; then
            echo "✅ 当前仓库无变更，跳过提交"
          else
            git commit -m "$COMMIT_MSG"
            git push origin HEAD:${{ github.ref_name }} || (
              git pull --rebase origin ${{ github.ref_name }} &&
              git push origin HEAD:${{ github.ref_name }}
            )
          fi

      - name: 13. 生产模式：克隆 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          set -euo pipefail

          rm -rf /tmp/FnDepot
          git clone "https://${{ secrets.FnDepot_PAT }}@github.com/${FNDEPOT_REPO}.git" /tmp/FnDepot

      - name: 14. 生产模式：复制 FPK 到 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          set -euo pipefail

          mkdir -p "/tmp/FnDepot/$FNDEPOT_APP_DIR"

          cp "${{ steps.build_fpk.outputs.fpk_base_file }}" "/tmp/FnDepot/$FNDEPOT_APP_DIR/"

          echo "✅ 已复制：${APP_ID}.fpk"

      - name: 15. 生产模式：更新 FnDepot fnpack.json
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          set -euo pipefail

          VERSION="${{ steps.remote_ver.outputs.remote_version }}"
          JSON_FILE="/tmp/FnDepot/fnpack.json"

          if [ ! -f "$JSON_FILE" ]; then
            echo '{}' > "$JSON_FILE"
          fi

          jq --arg app "$APP_ID" --arg ver "$VERSION" \
            '.[$app] = (.[$app] // {}) | .[$app].version = $ver' \
            "$JSON_FILE" > "$JSON_FILE.tmp"

          mv "$JSON_FILE.tmp" "$JSON_FILE"

      - name: 16. 生产模式：更新 FnDepot README
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          set -euo pipefail

          VERSION="${{ steps.remote_ver.outputs.remote_version }}"
          README_FILE="/tmp/FnDepot/README.md"

          if [ ! -f "$README_FILE" ]; then
            cat > "$README_FILE" <<EOF
          # FnDepot

          | 应用名称 | 版本号 | 来源 | 类型 |
          |---|---|---|---|
          | **${APP_NAME}** | ${VERSION} | ${DOCKER_IMAGE} | Docker |
          EOF
          else
            if grep -q "\*\*${APP_NAME}\*\*" "$README_FILE"; then
              sed -i -E \
                "s/(^\|.*\*\*${APP_NAME}\*\*.*\|[[:space:]]*)v?[0-9.]+([[:space:]]*\|.*$)/\1${VERSION}\2/" \
                "$README_FILE"
            else
              echo "| **${APP_NAME}** | ${VERSION} | ${DOCKER_IMAGE} | Docker |" >> "$README_FILE"
            fi
          fi

      - name: 17. 生产模式：提交 FnDepot 变更
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          set -euo pipefail

          cd /tmp/FnDepot

          git add "$FNDEPOT_APP_DIR/" fnpack.json README.md

          if git diff --cached --quiet; then
            echo "✅ FnDepot 无变更，跳过提交"
          else
            git commit -m "chore: 更新${APP_NAME}至v${{ steps.remote_ver.outputs.remote_version }}"
            git push origin "$FNDEPOT_BRANCH" || (
              git pull --rebase origin "$FNDEPOT_BRANCH" &&
              git push origin "$FNDEPOT_BRANCH"
            )
          fi

      - name: 18. 生产模式：创建 GitHub Release
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        uses: softprops/action-gh-release@v3
        with:
          overwrite_files: true
          tag_name: "v${{ steps.remote_ver.outputs.remote_version }}-${{ env.RELEASE_ARCH_NAME }}"
          name: "${{ env.APP_ID }} v${{ steps.remote_ver.outputs.remote_version }}"
          body: |
            ## 自动更新说明

            - 应用：${{ env.APP_NAME }}
            - 版本：v${{ steps.remote_ver.outputs.remote_version }}
            - Platform：${{ env.APP_PLATFORM }}
            - Release架构名：${{ env.RELEASE_ARCH_NAME }}
            - Docker镜像：${{ env.DOCKER_IMAGE }}
            - Digest：${{ steps.remote_ver.outputs.remote_digest }}
            - fnpack版本：${{ env.FNPACK_VERSION }}
            - 打包时间：${{ steps.init.outputs.build_time }}

          files: ${{ steps.build_fpk.outputs.fpk_release_file }}
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 19. 失败时上传调试日志
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_id }}
          path: |
            ${{ env.BASE_DIR }}/manifest
            ${{ env.DIGEST_FILE }}
            /tmp/fpk_build/*
            /tmp/fpk-packages/**/*
            /tmp/FnDepot/README.md
            /tmp/FnDepot/fnpack.json
          retention-days: 7
